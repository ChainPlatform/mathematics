name: Daily AI Prediction

on:
  schedule:
    - cron: '58 11 * * *'
  workflow_dispatch:

jobs:
  ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm install fs-extra

      # =======================
      # 🔁 RETRY AI
      # =======================
      - name: Run AI Generator with retry
        run: |
          for i in 1 2 3 4 5
          do
            echo "🧠 Attempt $i..."

            node calculator.js > ai_output.txt 2>&1

            echo "----- LOG -----"
            cat ai_output.txt

            if grep -q "DONE AI PREDICTION" ai_output.txt; then
              if [ -f ai_output.json ]; then
                if jq -e 'type=="object"' ai_output.json >/dev/null 2>&1; then
                  echo "✅ AI success"
                  break
                fi
              fi
            fi

            if [ $i -eq 5 ]; then
              echo "❌ AI failed after 5 attempts"
              exit 1
            fi

            echo "⏳ Retry after 5 minutes..."
            sleep 300
          done

      # =======================
      # 🧪 DEBUG JSON
      # =======================
      - name: Debug AI output
        run: |
          echo "===== AI OUTPUT ====="
          cat ai_output.json || echo "❌ Missing file"

      # =======================
      # 📦 BUILD PAYLOAD
      # =======================
      - name: Build payload
        id: slack
        run: |
          payload=$(jq -c '

          def highlight:
            if . == "000000" then ""
            elif test("00$") then "🔥\(.)🔥"
            elif test("(\\d)\\1\\1") then "💸\(.)💸"
            else . end;

          def provinceBlocks(data):
            if data == null then []
            else
              data
              | to_entries
              | map({
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text:
                      "*\(.key)*\n\(.value | map(highlight) | join("  •  "))"
                  }
                })
            end;

          {
            text: "AI Prediction",
            blocks:

              (
                [
                  {
                    type: "header",
                    text: {
                      type: "plain_text",
                      text: "🎯 AI Prediction \(.date // "N/A")"
                    }
                  },

                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*🇻🇳 Miền Bắc*\n\((.xsmb // []) | map(select(. != "000000") | highlight) | join("  •  "))"
                    }
                  },

                  { type: "divider" },

                  {
                    type: "section",
                    text: { type: "mrkdwn", text: "*🌴 Miền Nam*" }
                  }
                ]

                + provinceBlocks(.xsmn)

                + [
                  { type: "divider" },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: "*🏔️ Miền Trung*" }
                  }
                ]

                + provinceBlocks(.xsmt)

                + [
                  { type: "divider" },
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*🎰 Vietlott*\n\nPower 6/55\n\((.power655 // []) | map("• " + .) | join("\n"))\n\nMega 6/45\n\((.mega645 // []) | map("• " + .) | join("\n"))"
                    }
                  }
                ]
              )
          }

          ' ai_output.json)

          echo "payload<<EOF" >> $GITHUB_OUTPUT
          echo "$payload" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # =======================
      # 📤 SEND TO SLACK
      # =======================
      - name: Send to Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '${{ steps.slack.outputs.payload }}' \
          ${{ secrets.SLACK_WEBHOOK }}