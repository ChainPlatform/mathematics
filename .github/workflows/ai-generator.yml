name: Daily AI Prediction

on:
  schedule:
    - cron: '58 11 * * *'
  workflow_dispatch:

jobs:
  ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm install fs-extra

      # =======================
      # 🔁 RETRY AI
      # =======================
      - name: Run AI Generator with retry
        run: |
          for i in 1 2 3 4 5
          do
            echo "🧠 Attempt $i..."

            node calculator.js > ai_output.txt 2>&1

            echo "----- LOG -----"
            cat ai_output.txt

            if grep -q "DONE AI PREDICTION" ai_output.txt; then
              if [ -f ai_output.json ]; then
                if jq -e 'type=="object"' ai_output.json >/dev/null 2>&1; then
                  echo "✅ AI success"
                  break
                fi
              fi
            fi

            if [ $i -eq 5 ]; then
              echo "❌ AI failed after 5 attempts"
              exit 1
            fi

            echo "⏳ Retry after 5 minutes..."
            sleep 300
          done

      # =======================
      # 🧪 DEBUG JSON
      # =======================
      - name: Debug AI output
        run: |
          echo "===== AI OUTPUT ====="
          cat ai_output.json || echo "❌ Missing file"

      # =======================
      # 📦 BUILD PAYLOAD
      # =======================
      - name: Build payload
        id: slack
        run: |
          payload=$(jq -c --slurpfile calc ./results/calculators.json '

          def highlight:
            if . == "000000" then ""
            elif test("00$") then "🔥\(.)🔥"
            elif test("(\\d)\\1\\1") then "💸\(.)💸"
            else . end;

          def provinceBlocks(data):
            if data == null then []
            else
              data
              | to_entries
              | map({
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text:
                      "*\(.key)*\n\(.value | map(highlight) | join("  •  "))"
                  }
                })
            end;

          def stats:
            {
              win: ($calc[0] | map(select(.status=="win")) | length),
              lose: ($calc[0] | map(select(.status=="lose")) | length),
              total: ($calc[0] | map(select(.status!=null)) | length)
            };

          def rate:
            (stats) as $s |
            if $s.total == 0 then "0%"
            else ((($s.win * 100) / $s.total | floor | tostring) + "%")
            end;

          def latest:
            $calc[0][0];

          def today:
            ($calc[0] | map(select(.status!=null)) | .[0]);

          def last7:
            $calc[0]
            | map(select(.status!=null))
            | .[:7];

          def last7Stats:
            (last7) as $l |
            {
              win: ($l | map(select(.status=="win")) | length),
              lose: ($l | map(select(.status=="lose")) | length),
              total: ($l | length)
            };

          def last7Rate:
            (last7Stats) as $s |
            if $s.total == 0 then "0%"
            else ((($s.win * 100) / $s.total | floor | tostring) + "%")
            end;

          def currentMonth:
            (now | strftime("%m-%Y"));

          def monthData:
            $calc[0]
            | map(select(.status!=null))
            | map(select(.date[3:10] == currentMonth));

          def monthStats:
            (monthData) as $m |
            {
              win: ($m | map(select(.status=="win")) | length),
              lose: ($m | map(select(.status=="lose")) | length),
              total: ($m | length)
            };

          def monthRate:
            (monthStats) as $s |
            if $s.total == 0 then "0%"
            else ((($s.win * 100) / $s.total | floor | tostring) + "%")
            end;

          {
            text: "AI Prediction",
            blocks:

              (
                [
                  {
                    type: "header",
                    text: {
                      type: "plain_text",
                      text: "🎯 AI Prediction \(.date // "N/A")"
                    }
                  },

                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*🇻🇳 Miền Bắc*\n\((.xsmb // []) | map(select(. != "000000") | highlight) | join("  •  "))"
                    }
                  },

                  { type: "divider" },

                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*📅 Bộ số ngày mai*\n\((latest.numbers // []) | join("  •  "))"
                    }
                  },

                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*🎯 Kết quả hôm nay*\n\(
                          if (today) then
                            (today.result + " → " + (if today.status=="win" then "🔥 WIN" else "LOSE" end))
                          else "Chưa có"
                          end
                        )"
                    }
                  },

                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*📊 Tỷ lệ*\nWin: \(stats.win) | Lose: \(stats.lose) | Rate: \(rate)"
                    }
                  },

                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*📊 7 ngày gần nhất*\nWin: \(last7Stats.win) | Lose: \(last7Stats.lose) | Rate: \(last7Rate)"
                    }
                  },

                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*📅 Tháng này*\nWin: \(monthStats.win) | Lose: \(monthStats.lose) | Rate: \(monthRate)"
                    }
                  },

                  { type: "divider" },

                  {
                    type: "section",
                    text: { type: "mrkdwn", text: "*🌴 Miền Nam*" }
                  }
                ]

                + provinceBlocks(.xsmn)

                + [
                  { type: "divider" },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: "*🏔️ Miền Trung*" }
                  }
                ]

                + provinceBlocks(.xsmt)

                + [
                  { type: "divider" },
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text:
                        "*🎰 Vietlott*\n\nPower 6/55\n\((.power655 // []) | map("• " + .) | join("\n"))\n\nMega 6/45\n\((.mega645 // []) | map("• " + .) | join("\n"))"
                    }
                  }
                ]
              )
          }

          ' ai_output.json)

          echo "payload<<EOF" >> $GITHUB_OUTPUT
          echo "$payload" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # =======================
      # 📤 SEND TO SLACK
      # =======================
      - name: Send to Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '${{ steps.slack.outputs.payload }}' \
          ${{ secrets.SLACK_WEBHOOK }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/calculators.json
          git diff --quiet --cached || git commit -m "📊 Calculators XSMB @ $(date -u +'%Y-%m-%d')" 
          git push